
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IoT - Automação Residencial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm">
            <div>
                <h1 class="h3 mb-0 text-dark fw-bold">
                    <i class="fa-solid fa-house-laptop text-primary me-2"></i>
                    SmartHome Dashboard
                </h1>
                <small class="text-muted">
                    Projeto Integrador IoT - Monitoramento em Tempo Real
                </small>
            </div>

            <span id="badgeModo" class="badge bg-secondary p-2 fs-6">
                Buscando modo...
            </span>
        </div>

        <div class="row g-3 mb-4">

            <div class="col-md-4">
                <div class="card card-status bg-white p-3 d-flex flex-row align-items-center justify-content-between">
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-bold">
                            Temperatura
                        </h6>

                        <h2 id="txtTemp" class="fw-bold mb-0">
                            --.- °C
                        </h2>
                    </div>

                    <i class="fa-solid fa-temperature-high text-danger icon-size"></i>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-status bg-white p-3 d-flex flex-row align-items-center justify-content-between">
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-bold">
                            Luminosidade
                        </h6>

                        <h2 id="txtLuz" class="fw-bold mb-0">
                            ---- Raw
                        </h2>
                    </div>

                    <i class="fa-solid fa-lightbulb text-warning icon-size"></i>
                </div>
            </div>

            <div class="col-md-4">
                <div id="cardPorta" class="card card-status bg-white p-3 d-flex flex-row align-items-center justify-content-between">
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-bold">
                            Sensor Porta
                        </h6>

                        <h2 id="txtPorta" class="fw-bold mb-0">
                            ---
                        </h2>
                    </div>

                    <i id="iconPorta" class="fa-solid fa-door-closed text-secondary icon-size"></i>
                </div>
            </div>

        </div>

        <div class="row g-4 mb-4">

            <div class="col-lg-4">
                <div class="card border-0 rounded-3 shadow-sm p-4 h-100 bg-white">

                    <h5 class="fw-bold mb-3">
                        <i class="fa-solid fa-sliders text-primary me-2"></i>
                        Painel de Controle
                    </h5>

                    <hr>

                    <div class="mb-4">
                        <label class="d-block fw-bold text-muted mb-2">
                            AR-CONDICIONADO
                            <span id="statusAC" class="badge bg-secondary float-end">
                                ---
                            </span>
                        </label>

                        <div class="btn-group w-100">
                            <button onclick="enviarComando('ac/on')" class="btn btn-outline-success fw-bold">
                                <i class="fa-solid fa-power-off me-1"></i>
                                Ligar
                            </button>

                            <button onclick="enviarComando('ac/off')" class="btn btn-outline-danger fw-bold">
                                <i class="fa-solid fa-ban me-1"></i>
                                Desligar
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="d-block fw-bold text-muted mb-2">
                            LÂMPADA DA SALA
                            <span id="statusLuz" class="badge bg-secondary float-end">
                                ---
                            </span>
                        </label>

                        <div class="btn-group w-100">
                            <button onclick="enviarComando('luz/on')" class="btn btn-outline-success fw-bold">
                                <i class="fa-solid fa-lightbulb me-1"></i>
                                Ligar
                            </button>

                            <button onclick="enviarComando('luz/off')" class="btn btn-outline-danger fw-bold">
                                <i class="fa-regular fa-lightbulb me-1"></i>
                                Desligar
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="d-block fw-bold text-muted mb-2">
                            GERENCIAMENTO DE MODO
                        </label>

                        <button onclick="enviarComando('auto/on')" class="btn btn-primary w-100 fw-bold">
                            <i class="fa-solid fa-robot me-1"></i>
                            Ativar Modo Automático
                        </button>
                    </div>

                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 rounded-3 shadow-sm p-4 bg-white h-100">

                    <h5 class="fw-bold mb-3">
                        <i class="fa-solid fa-chart-line text-primary me-2"></i>
                        Histórico Térmico (Últimas Leituras)
                    </h5>

                    <hr>

                    <div style="position: relative; height:250px; width:100%">
                        <canvas id="graficoTemperatura"></canvas>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
